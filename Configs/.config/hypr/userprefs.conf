
# в–Ҳв–‘в–ҲвҖғв–Ҳв–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҲвҖғ вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Ҳв–„в–ҲвҖғв–„в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–„вҖғ вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–‘вҖғв–„в–Ҳ

# Set your personal hyprland configuration here
# See https://wiki.hypr.land/Configuring for more information

exec-once = quickshell -p ~/test/earth/
exec-once = openrgb -p pf1
exec-once = bash ~/mhm/scripts/startup-layout

# Disable awww wallpaper daemon
env = WALLPAPER_BACKEND,hyprpaper

# Enable portal file picker for GTK apps
env = GTK_USE_PORTAL,1
env = GDK_DEBUG,portals
# // в–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Җв–Ҳв–Җ
# // в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–‘в–Ҳв–‘


#  Uncomment to enable // change to a preferred value
# рҹ”— See https://wiki.hypr.land/Configuring/Variables/#input
input {
    # kb_layout = us
    kb_layout = us,ara
    kb_options = grp:caps_toggle
    repeat_delay = 200
    repeat_rate = 30
    # follow_mouse = 1
    # sensitivity = 0
    # force_no_accel = 0
    # accel_profile = flat
    # numlock_by_default = true

    # рҹ”— See https://wiki.hypr.land/Configuring/Variables/#touchpad
    touchpad {
        natural_scroll = no
    }

}



# рҹ”— See https://wiki .hyprland.org/Configuring/Variables/#gestures
gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
}

# for window shallow similar to devour
misc {
    # enable_swallow = true
    # swallow_regex = (foot|kitty|allacritty|Alacritty|ghostty|Ghostty|org.wezfurlong.wezterm)
}

# Don't show update on first launch
ecosystem {
  # no_update_news = true
}

# Super+F fullscreen
bindd = $mainMod, F, fullscreen, fullscreen, 0

# Super+F11/F12 hyprsunset gamma
bindde = $mainMod, F11, hyprsunset dimmer, exec, /home/btw/mhm/scripts/hyprsunset-temp dimmer
bindde = $mainMod, F12, hyprsunset brighter, exec, /home/btw/mhm/scripts/hyprsunset-temp brighter

# F9 stop all audio
bind = , F9, exec, playerctl pause && pamixer -m

# Super+C center window, Super+Shift+C resize to 30%
bindd = $mainMod, C, center window, exec, bash ~/mhm/scripts/center.sh
bindd = $mainMod SHIFT, C, resize window, exec, bash ~/mhm/scripts/resize-30.sh

# All windows full opacity, blur for special workspace
decoration {
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
    blur {
        enabled = true
        size = 8
        passes = 2
    }
}

# Kitty no blur
windowrule = no_blur true,match:class ^(kitty)$

# Workspace to monitor assignments
workspace = 1,monitor:DP-2
workspace = 2,monitor:DP-2
workspace = 9,monitor:DP-2
workspace = 3,monitor:DP-1
workspace = 4,monitor:DP-1

# Animations 2.5x faster
animations {
    animation = windows, 1, 2.5, default, popin 60%
    animation = windowsIn, 1, 2.5, default, popin 60%
    animation = windowsOut, 1, 2.5, default, popin 60%
    animation = windowsMove, 1, 2.5, default, slide
    animation = layers, 1, 2.5, default, popin
    animation = fade, 1, 2.5, default
    animation = fadeIn, 1, 2.5, default
    animation = fadeOut, 1, 2.5, default
    animation = fadeSwitch, 1, 2.5, default
    animation = fadeShadow, 1, 2.5, default
    animation = fadeDim, 1, 2.5, default
    animation = fadeLayers, 1, 2.5, default
    animation = workspaces, 1, 2.5, default, slide
    animation = border, 1, 2.5, liner
    animation = borderangle, 1, 2.5, liner, once
    animation = specialWorkspace, 0, 0, default
}



# DP-2 ICC Profile (merges with monitors.conf from nwg-displays)
monitor=DP-2,2560x1080@99.94,0x0,1.0,transform,1,bitdepth,10,icc,/home/btw/.local/share/color/icc/LG-ULTRAWIDE.icm
