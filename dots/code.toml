[code]
action = "preserve"

[[code.files]]
source_root = "Configs/.config/Code - OSS/User"
target_root = "${XDG_CONFIG_HOME}/Code - OSS/User"
paths = "settings.json"

[vscode]
action = "preserve"

[[vscode.files]]
source_root = "Configs/.config/Code/User"
target_root = "${XDG_CONFIG_HOME}/Code/User"
paths = "settings.json"

[code-oss]
action = "preserve"

[[code-oss.dependency]]
yay = ["code"]

[[code-oss.files]]
source_root = "Configs/.config/Code - OSS/User"
target_root = "${XDG_CONFIG_HOME}/Code - OSS/User"
paths = "settings.json"

[[code-oss.files]]
action = "preserve"
source_root = "Configs/.config"
target_root = "${XDG_CONFIG_HOME}"
paths = "code-flags.conf"

[vscodium]
action = "preserve"

[[vscodium.files]]
source_root = "Configs/.config/VSCodium/User"
target_root = "${XDG_CONFIG_HOME}/VSCodium/User"
paths = "settings.json"
