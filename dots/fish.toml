[fish]

[[fish.dependency]]
yay = ["fish", "starship" , "fastfetch"]
paru = ["fish", "starship", "fastfetch"]
dnf = ["fish", "starship", "fastfetch"]

[[fish.files]]
action = "sync"
source_root = "Configs/.config/fish"
target_root = "${XDG_CONFIG_HOME}/fish"
paths = ["conf.d", "functions", "completions"]

[[fish.files]]
action = "preserve"
source_root = "Configs/.config/fish"
target_root = "${XDG_CONFIG_HOME}/fish"
paths = "config.fish"

[[fish.files]]
action = "preserve"
source_root = "Configs/.config/starship"
target_root = "${XDG_CONFIG_HOME}/starship"
paths = "starship.toml"
